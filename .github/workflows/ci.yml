name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Backend Testing Job
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run linter
        working-directory: backend
        run: npm run lint

      - name: Run unit tests
        working-directory: backend
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_DATABASE: test_db
          JWT_SECRET: test-secret-key-for-ci
          JWT_EXPIRATION: 24h
          NODE_ENV: test

      - name: Run E2E tests
        working-directory: backend
        run: npm run test:e2e
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_DATABASE: test_db
          JWT_SECRET: test-secret-key-for-ci
          JWT_EXPIRATION: 24h
          NODE_ENV: test

      - name: Generate coverage report
        working-directory: backend
        run: npm run test:cov
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_DATABASE: test_db
          JWT_SECRET: test-secret-key-for-ci
          JWT_EXPIRATION: 24h
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  # Frontend Testing Job
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linter
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build application
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:3000

  # Docker Build Job
  docker-build:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: task-schedule-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: task-schedule-dashboard:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Compose
        run: |
          docker-compose up -d
          echo "Waiting for services to be healthy..."
          sleep 45
          
          # Check if services are running
          docker-compose ps
          
          # Test backend health
          echo "Testing backend API..."
          curl -f http://localhost:3000 || exit 1
          
          # Test frontend
          echo "Testing frontend..."
          curl -f http://localhost:3001 || exit 1
          
          # Test Swagger docs
          echo "Testing Swagger documentation..."
          curl -f http://localhost:3000/api/docs || exit 1
          
          echo "All services are healthy!"
          
          # Show logs for debugging if needed
          docker-compose logs --tail=50
          
          # Cleanup
          docker-compose down -v

  # Security Scanning Job
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: '.'

  # Code Quality Job
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=task-schedule-manager
            -Dsonar.organization=your-org
            -Dsonar.sources=backend/src,frontend/src
            -Dsonar.tests=backend/test,backend/src/**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
        continue-on-error: true  # Don't fail if SonarCloud is not configured

  # Deployment Readiness Check
  deployment-check:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, docker-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check environment files
        run: |
          echo "Checking for required environment files..."
          test -f .env.example || exit 1
          test -f backend/.env.example || exit 1
          test -f frontend/.env.example || exit 1
          echo "✓ All environment files present"

      - name: Check Docker files
        run: |
          echo "Checking for required Docker files..."
          test -f docker-compose.yml || exit 1
          test -f backend/Dockerfile || exit 1
          test -f frontend/Dockerfile || exit 1
          echo "✓ All Docker files present"

      - name: Check documentation
        run: |
          echo "Checking for required documentation..."
          test -f README.md || exit 1
          test -f backend/README.md || exit 1
          echo "✓ Documentation present"

      - name: Validate docker-compose.yml
        run: |
          echo "Validating docker-compose.yml..."
          docker-compose config > /dev/null
          echo "✓ docker-compose.yml is valid"

      - name: Check migrations
        run: |
          echo "Checking for database migrations..."
          test -d backend/src/database/migrations || exit 1
          echo "✓ Migrations directory exists"

      - name: Check seed data
        run: |
          echo "Checking for seed data..."
          test -f backend/src/database/seeds/seed.ts || exit 1
          echo "✓ Seed data present"

  # Summary Job
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, docker-build, security-scan, code-quality, deployment-check]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "==================================="
          echo "CI Pipeline Summary"
          echo "==================================="
          echo "Backend Tests: ${{ needs.backend-test.result }}"
          echo "Frontend Tests: ${{ needs.frontend-test.result }}"
          echo "Docker Build: ${{ needs.docker-build.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Deployment Check: ${{ needs.deployment-check.result }}"
          echo "==================================="
          
          if [ "${{ needs.backend-test.result }}" != "success" ] || \
             [ "${{ needs.frontend-test.result }}" != "success" ] || \
             [ "${{ needs.docker-build.result }}" != "success" ] || \
             [ "${{ needs.deployment-check.result }}" != "success" ]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          else
            echo "✅ CI Pipeline Passed"
          fi

